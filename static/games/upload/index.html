<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 업로드 | 61315 GAMELAB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; background: #f4f6f8; color: #2c3e50; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #7f8c9b; font-size: 13px; margin-bottom: 24px; }
  .sub a { color: #34495e; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  input[type=text], input[type=number], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #d8dee5; border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus { outline: 2px solid #34495e33; border-color: #34495e; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600; font-family: inherit; }
  .btn-primary { background: #34495e; color: #fff; }
  .btn-primary:hover { background: #2c3e50; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .progress { background: #eef1f4; border-radius: 8px; height: 10px; overflow: hidden; margin-top: 10px; display: none; }
  .progress .bar { height: 100%; width: 0; background: #27ae60; transition: width .2s; }
  .status { font-size: 12px; color: #7f8c9b; margin-top: 8px; min-height: 16px; word-break: break-all; }
  .error { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 16px; }
  .hint { font-size: 12px; color: #95a5a6; margin-top: 4px; }
  .file-label { display: flex; align-items: center; gap: 10px; }
  .done { text-align: center; padding: 20px 0; }
  .done .big { font-size: 40px; }
  .done h2 { font-size: 18px; margin: 10px 0 6px; }
  .done a.play { display: inline-block; margin-top: 14px; background: #27ae60; color: #fff; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-weight: 700; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chips button { background: #eef1f4; color: #34495e; padding: 6px 12px; font-size: 12px; border-radius: 999px; }
  .chips button:hover { background: #e0e6ec; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎮 게임 업로드</h1>
  <p class="sub">HTML5 게임 빌드(zip)를 올리면 <a href="/games/">게임 목록</a>에 바로 공개됩니다. 하루 10개, 전체 저장 용량 10GB까지 올릴 수 있어요.</p>

  <div class="card" id="view-form">
    <div class="row">
      <div>
        <label>제목 *</label>
        <input type="text" id="f-title" maxlength="100">
      </div>
      <div>
        <label>게임 주소 (선택)</label>
        <input type="text" id="f-slug" maxlength="50" placeholder="비워두면 자동으로 만들어져요">
      </div>
    </div>

    <label>설명</label>
    <textarea id="f-desc" maxlength="2000"></textarea>

    <div class="row">
      <div>
        <label>가로 (px)</label>
        <input type="number" id="f-width" value="960" min="100" max="4096">
      </div>
      <div>
        <label>세로 (px)</label>
        <input type="number" id="f-height" value="600" min="100" max="4096">
      </div>
    </div>

    <label>게임 빌드 (zip) *</label>
    <div class="file-label">
      <input type="file" id="f-zip" accept=".zip">
    </div>
    <p class="hint">zip 안에 <b>index.html</b>이 있어야 합니다. (최상위 또는 단일 폴더 안) Unity WebGL 압축 빌드(gzip/brotli)도 그대로 올리면 돼요.</p>

    <label>커버 이미지 (선택)</label>
    <input type="file" id="f-cover" accept="image/png,image/jpeg,image/webp,image/gif">

    <div class="progress" id="progress"><div class="bar" id="progress-bar"></div></div>
    <div class="status" id="upload-status"></div>
    <div class="error" id="form-error"></div>

    <div style="margin-top:18px">
      <button class="btn-primary" id="btn-save">업로드</button>
    </div>
    <p class="hint">같은 브라우저에서 같은 주소로 다시 올리면 내 게임의 빌드가 교체됩니다.</p>
    <div id="my-games" style="display:none">
      <label>내가 올린 게임 (누르면 주소가 채워져요)</label>
      <div id="my-games-list"></div>
    </div>
  </div>

  <div class="card done" id="view-done" style="display:none">
    <div class="big">✅</div>
    <h2>업로드 완료!</h2>
    <p class="hint" id="done-msg"></p>
    <a class="play" id="done-link" href="/games/">게임 하러 가기</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nevoggtlsbqrjwdwdwcb.supabase.co'
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ldm9nZ3Rsc2Jxcmp3ZHdkd2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzI5NjAsImV4cCI6MjA5MDQ0ODk2MH0.8U9NjKPSQrkuMWHsL76z3_w5p6mglVOHZM2bVlE5Ewc'
const FN_URL = SUPABASE_URL + '/functions/v1/games-api'

const $ = id => document.getElementById(id)

// 내가 올린 게임의 수정 토큰 (slug → token). 재업로드 때 소유권 증명에 쓴다.
function tokenMap() {
  try { return JSON.parse(localStorage.getItem('games_upload_tokens') || '{}') } catch (_) { return {} }
}
function saveToken(slug, token) {
  const m = tokenMap()
  m[slug] = token
  localStorage.setItem('games_upload_tokens', JSON.stringify(m))
}

// 제목에서 영문/숫자만 추려 주소를 만들고, 겹치지 않게 랜덤 꼬리를 붙인다
function autoSlug(title) {
  const base = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 30)
  const tail = Math.random().toString(36).slice(2, 6)
  return (base ? base + '-' : 'game-') + tail
}

async function api(action, payload = {}) {
  const res = await fetch(FN_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': ANON_KEY,
      'Authorization': 'Bearer ' + ANON_KEY,
    },
    body: JSON.stringify({ action, ...payload }),
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || '요청 실패 (' + res.status + ')')
  return data
}

// ---------- zip 처리 ----------
const MIME = {
  html: 'text/html', htm: 'text/html', js: 'application/javascript', mjs: 'application/javascript',
  css: 'text/css', json: 'application/json', wasm: 'application/wasm', xml: 'application/xml', txt: 'text/plain',
  png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', webp: 'image/webp',
  svg: 'image/svg+xml', ico: 'image/x-icon', mp3: 'audio/mpeg', ogg: 'audio/ogg', wav: 'audio/wav',
  m4a: 'audio/mp4', mp4: 'video/mp4', webm: 'video/webm', woff: 'font/woff', woff2: 'font/woff2',
  ttf: 'font/ttf', otf: 'font/otf', pdf: 'application/pdf',
}
function mimeOf(path) {
  const ext = path.split('.').pop().toLowerCase()
  return MIME[ext] || 'application/octet-stream'
}

async function readZip(file) {
  const zip = await JSZip.loadAsync(file)
  let paths = []
  const sizes = {}
  zip.forEach((p, entry) => {
    if (entry.dir) return
    const base = p.split('/').pop()
    if (p.startsWith('__MACOSX/') || base.startsWith('.')) return
    paths.push(p)
    sizes[p] = (entry._data && entry._data.uncompressedSize) || 0
  })
  if (paths.length === 0) throw new Error('zip이 비어 있습니다.')
  if (paths.length > 2000) throw new Error('파일이 너무 많습니다 (최대 2000개).')

  // 모든 파일이 단일 폴더 안에 있으면 그 폴더를 벗겨낸다
  let prefix = ''
  if (!paths.includes('index.html')) {
    const roots = new Set(paths.map(p => p.split('/')[0]))
    if (roots.size === 1 && paths[0].includes('/')) prefix = paths[0].split('/')[0] + '/'
  }
  const files = paths.map(p => ({ zipPath: p, path: p.slice(prefix.length), size: sizes[p] }))
  if (!files.some(f => f.path === 'index.html')) {
    throw new Error('zip 최상위(또는 단일 폴더 안)에 index.html이 없습니다.')
  }
  return { zip, files }
}

// 압축된 빌드(.gz/.br, 구형 .unityweb)는 Content-Encoding을 붙여 올린다.
// Cloudflare가 업로드 시점에 압축을 풀어 원본을 저장하므로 어떤 Unity 빌드 설정이든 동작한다.
async function uploadHeaders(path, blob) {
  const p = path.toLowerCase()
  if (p.endsWith('.gz')) return { 'Content-Type': mimeOf(p.slice(0, -3)), 'Content-Encoding': 'gzip' }
  if (p.endsWith('.br')) return { 'Content-Type': mimeOf(p.slice(0, -3)), 'Content-Encoding': 'br' }
  if (p.endsWith('.unityweb')) {
    const head = new Uint8Array(await blob.slice(0, 64).arrayBuffer())
    if (head[0] === 0x1f && head[1] === 0x8b) return { 'Content-Type': 'application/octet-stream', 'Content-Encoding': 'gzip' }
    let ascii = ''
    for (let i = 0; i < head.length; i++) ascii += String.fromCharCode(head[i])
    if (ascii.includes('UnityWeb Compressed Content (brotli)')) return { 'Content-Type': 'application/octet-stream', 'Content-Encoding': 'br' }
  }
  return { 'Content-Type': mimeOf(path) }
}

// 500MB가 넘는 대용량 게임은 61315 운영진 이름을 알아야 올릴 수 있다 (정답 확인은 서버에서)
const BIG_GAME_BYTES = 500 * 1000 * 1000

function askStaffName(totalBytes) {
  if (totalBytes <= BIG_GAME_BYTES) return null
  const answer = prompt(
    `이 게임은 ${(totalBytes / 1e6).toFixed(0)}MB로 500MB가 넘어요.\n` +
    '대용량 게임은 61315 운영진의 이름을 한 명 입력해야 올릴 수 있어요.'
  )
  if (answer === null) throw new Error('업로드를 취소했습니다.')
  return answer.trim()
}

async function uploadFiles(slug, token, zip, files, staffName) {
  const bar = $('progress-bar'), status = $('upload-status')
  $('progress').style.display = 'block'
  let done = 0
  for (let i = 0; i < files.length; i += 50) {
    const batch = files.slice(i, i + 50)
    const { signed } = await api('sign_uploads', {
      slug,
      token,
      staff_name: staffName || undefined,
      paths: batch.map(f => f.path),
      bytes: batch.reduce((s, f) => s + (f.size || 0), 0),
    })
    const urlMap = Object.fromEntries(signed.map(s => [s.path, s.signedUrl]))
    const queue = [...batch]
    const workers = Array.from({ length: 4 }, async () => {
      while (queue.length > 0) {
        const f = queue.shift()
        const blob = await zip.file(f.zipPath).async('blob')
        const res = await fetch(urlMap[f.path], {
          method: 'PUT',
          headers: await uploadHeaders(f.path, blob),
          body: blob,
        })
        if (!res.ok) throw new Error('업로드 실패: ' + f.path + ' (' + res.status + ')')
        done++
        bar.style.width = Math.round(done / files.length * 100) + '%'
        status.textContent = `업로드 중 ${done}/${files.length} — ${f.path}`
      }
    })
    await Promise.all(workers)
  }
  status.textContent = `파일 업로드 완료 (${files.length}개)`
}

async function uploadCover(slug, token, file) {
  const ext = (file.name.split('.').pop() || 'png').toLowerCase().replace('jpeg', 'jpg')
  const { path, signedUrl } = await api('sign_cover', { slug, token, ext })
  const res = await fetch(signedUrl, {
    method: 'PUT',
    headers: { 'Content-Type': file.type || 'image/png' },
    body: file,
  })
  if (!res.ok) throw new Error('커버 업로드 실패')
  return path
}

// ---------- 업로드 ----------
async function save() {
  const errEl = $('form-error')
  errEl.textContent = ''
  const title = $('f-title').value.trim()
  let slug = $('f-slug').value.trim().toLowerCase()
  const description = $('f-desc').value.trim()
  const width = parseInt($('f-width').value, 10) || 960
  const height = parseInt($('f-height').value, 10) || 600
  const zipFile = $('f-zip').files[0]
  const coverFile = $('f-cover').files[0]

  if (!title) { errEl.textContent = '제목을 입력해주세요.'; return }
  if (slug && !/^[a-z0-9][a-z0-9-]{0,49}$/.test(slug)) { errEl.textContent = '게임 주소는 영문 소문자, 숫자, 하이픈(-)만 쓸 수 있어요.'; return }
  if (!slug) slug = autoSlug(title)
  if (!zipFile) { errEl.textContent = '게임 빌드 zip을 선택해주세요.'; return }

  $('btn-save').disabled = true
  try {
    $('upload-status').textContent = 'zip 압축 해제 중…'
    const parsed = await readZip(zipFile)

    // 새 게임 등록. slug가 이미 있으면 이 브라우저에 저장된 토큰으로 내 게임 재업로드를 시도한다.
    let token = null
    let isReupload = false
    try {
      const data = await api('create_game', { slug, title, description, width, height })
      token = data.upload_token
      saveToken(slug, token)
    } catch (e) {
      const saved = tokenMap()[slug]
      if (saved) {
        token = saved
        isReupload = true
      } else {
        throw e
      }
    }

    const totalBytes = parsed.files.reduce((s, f) => s + (f.size || 0), 0)
    const staffName = askStaffName(totalBytes)

    if (isReupload) {
      $('upload-status').textContent = '기존 빌드 삭제 중…'
      await api('clear_files', { slug, token })
    }

    await uploadFiles(slug, token, parsed.zip, parsed.files, staffName)

    let cover_path
    if (coverFile) {
      $('upload-status').textContent = '커버 이미지 업로드 중…'
      cover_path = await uploadCover(slug, token, coverFile)
    }

    await api('finish_upload', { slug, token, title, description, width, height, cover_path, staff_name: staffName || undefined })

    $('view-form').style.display = 'none'
    $('view-done').style.display = 'block'
    $('done-msg').textContent = (isReupload ? `"${title}" 빌드를 교체했습니다.` : `"${title}" 게임이 공개되었습니다.`) + ` (주소: ${slug})`
    $('done-link').href = '/games/#play=' + slug
  } catch (e) {
    errEl.textContent = e.message === 'STAFF_CHECK_FAILED'
      ? '운영진 이름이 맞지 않아요. 이름을 확인하고 다시 시도해주세요.'
      : e.message
  } finally {
    $('btn-save').disabled = false
  }
}

$('btn-save').addEventListener('click', save)

// 이 브라우저에서 올렸던 게임 목록 → 누르면 주소 칸이 채워져 재업로드(교체)로 이어진다
function renderMyGames() {
  const slugs = Object.keys(tokenMap())
  if (slugs.length === 0) return
  $('my-games').style.display = 'block'
  $('my-games-list').className = 'chips'
  $('my-games-list').innerHTML = slugs.map(s =>
    `<button type="button" data-slug="${s.replace(/[^a-z0-9-]/g, '')}">${s.replace(/[^a-z0-9-]/g, '')}</button>`
  ).join('')
}
$('my-games-list').addEventListener('click', e => {
  const b = e.target.closest('button[data-slug]')
  if (b) { $('f-slug').value = b.dataset.slug; $('f-slug').scrollIntoView({ behavior: 'smooth', block: 'center' }) }
})
renderMyGames()
</script>
</body>
</html>
