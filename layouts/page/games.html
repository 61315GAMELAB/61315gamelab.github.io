{{ define "body-class" }}template-games{{ end }}
{{ define "main" }}
<style>
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .game-card {
    background: var(--card-background);
    border-radius: var(--card-border-radius);
    box-shadow: var(--shadow-l1);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .game-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-l2); }
  .game-card .thumb {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #34495e, #5d7a99);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 1.1rem; text-align: center; padding: 10px;
  }
  .game-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .game-card .info { padding: 14px 16px 16px; }
  .game-card .info h3 { margin: 0; font-size: 1.5rem; }
  .game-card .info p {
    margin: 6px 0 0; font-size: 1.3rem; color: var(--card-text-color-secondary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .games-empty { color: var(--card-text-color-secondary); }

  /* 플레이어 오버레이 */
  .game-player {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(10, 14, 20, .96);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px;
  }
  .game-player.open { display: flex; }
  .game-player .player-bar {
    width: 100%; max-width: var(--player-w, 960px);
    display: flex; align-items: center; justify-content: space-between;
    color: #fff; margin-bottom: 10px; gap: 10px;
  }
  .game-player .player-bar h2 { margin: 0; font-size: 1.6rem; color: #fff; }
  .game-player .player-bar div { display: flex; gap: 8px; }
  .game-player button {
    background: rgba(255,255,255,.12); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 1.3rem; cursor: pointer; font-family: inherit;
  }
  .game-player button:hover { background: rgba(255,255,255,.24); }
  .game-player iframe {
    border: none; background: #000; border-radius: 8px;
    width: 100%; max-width: var(--player-w, 960px);
    aspect-ratio: var(--player-ar, 960 / 600);
    max-height: calc(100vh - 90px);
  }
</style>

<div class="games-grid" id="games-grid"></div>
<p class="games-empty" id="games-empty" style="display:none">아직 공개된 게임이 없습니다.</p>

<div class="game-player" id="game-player">
  <div class="player-bar">
    <h2 id="player-title"></h2>
    <div>
      <button id="player-fs" type="button">전체화면</button>
      <button id="player-close" type="button">✕ 닫기</button>
    </div>
  </div>
  <iframe id="player-frame" allow="autoplay; fullscreen; gamepad" allowfullscreen></iframe>
</div>

<script>
(function () {
  var SUPABASE_URL = 'https://nevoggtlsbqrjwdwdwcb.supabase.co'
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ldm9nZ3Rsc2Jxcmp3ZHdkd2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzI5NjAsImV4cCI6MjA5MDQ0ODk2MH0.8U9NjKPSQrkuMWHsL76z3_w5p6mglVOHZM2bVlE5Ewc'
  var STORAGE_URL = SUPABASE_URL + '/storage/v1/object/public/games/'

  var grid = document.getElementById('games-grid')
  var player = document.getElementById('game-player')
  var frame = document.getElementById('player-frame')
  var titleEl = document.getElementById('player-title')
  var gamesBySlug = {}

  function esc(s) {
    return (s || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    })
  }

  function openGame(slug) {
    var g = gamesBySlug[slug]
    if (!g) return
    titleEl.textContent = g.title
    player.style.setProperty('--player-w', g.width + 'px')
    player.style.setProperty('--player-ar', g.width + ' / ' + g.height)
    player.classList.add('open')
    document.body.style.overflow = 'hidden'
    if (location.hash !== '#play=' + slug) history.pushState(null, '', '#play=' + slug)

    // supabase.co는 HTML을 text/plain으로 서빙하므로(피싱 방지 정책)
    // 텍스트로 받아 <base>를 주입해 srcdoc으로 실행한다. 에셋은 base 덕분에
    // 스토리지에서 원래 MIME 타입 그대로 직접 로드된다.
    var entry = g.entry_path || 'index.html'
    var dir = STORAGE_URL + g.slug + '/' + (entry.indexOf('/') >= 0 ? entry.slice(0, entry.lastIndexOf('/') + 1) : '')
    fetch(STORAGE_URL + g.slug + '/' + entry)
      .then(function (r) {
        if (!r.ok) throw new Error('load failed')
        return r.text()
      })
      .then(function (html) {
        var baseTag = '<base href="' + dir + '">'
        if (/<head[^>]*>/i.test(html)) html = html.replace(/<head([^>]*)>/i, '<head$1>' + baseTag)
        else html = baseTag + html
        frame.srcdoc = html
      })
      .catch(function () {
        frame.srcdoc = '<p style="color:#fff;font-family:sans-serif;text-align:center;margin-top:40px">게임을 불러오지 못했습니다.</p>'
      })
  }

  function closeGame() {
    player.classList.remove('open')
    frame.removeAttribute('srcdoc')
    frame.src = 'about:blank'
    document.body.style.overflow = ''
    if (location.hash) history.pushState(null, '', location.pathname)
  }

  document.getElementById('player-close').addEventListener('click', closeGame)
  document.getElementById('player-fs').addEventListener('click', function () {
    if (frame.requestFullscreen) frame.requestFullscreen()
  })
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && player.classList.contains('open')) closeGame()
  })
  window.addEventListener('popstate', function () {
    var m = location.hash.match(/^#play=([a-z0-9-]+)$/)
    if (m) openGame(m[1])
    else closeGame()
  })

  fetch(SUPABASE_URL + '/rest/v1/games?select=slug,title,description,entry_path,cover_path,width,height&published=eq.true&order=created_at.desc', {
    headers: { apikey: ANON_KEY, Authorization: 'Bearer ' + ANON_KEY },
  })
    .then(function (r) { return r.json() })
    .then(function (games) {
      if (!Array.isArray(games) || games.length === 0) {
        document.getElementById('games-empty').style.display = 'block'
        return
      }
      games.forEach(function (g) { gamesBySlug[g.slug] = g })
      grid.innerHTML = games.map(function (g) {
        var thumb = g.cover_path
          ? '<img src="' + STORAGE_URL + esc(g.cover_path) + '" alt="' + esc(g.title) + '" loading="lazy">'
          : esc(g.title)
        return '<div class="game-card" data-slug="' + esc(g.slug) + '" role="button" tabindex="0">' +
          '<div class="thumb">' + thumb + '</div>' +
          '<div class="info"><h3>' + esc(g.title) + '</h3>' +
          (g.description ? '<p>' + esc(g.description) + '</p>' : '') +
          '</div></div>'
      }).join('')

      grid.addEventListener('click', function (e) {
        var card = e.target.closest('.game-card')
        if (card) openGame(card.dataset.slug)
      })
      grid.addEventListener('keydown', function (e) {
        var card = e.target.closest('.game-card')
        if (card && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); openGame(card.dataset.slug) }
      })

      var m = location.hash.match(/^#play=([a-z0-9-]+)$/)
      if (m) openGame(m[1])
    })
    .catch(function () {
      document.getElementById('games-empty').textContent = '게임 목록을 불러오지 못했습니다.'
      document.getElementById('games-empty').style.display = 'block'
    })
})()
</script>
