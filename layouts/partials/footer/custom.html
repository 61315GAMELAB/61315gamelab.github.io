{{ if .IsHome }}
<div id="apply-modal" class="apply-modal" aria-hidden="true">
  <div class="apply-modal__backdrop" data-apply-close></div>
  <div class="apply-modal__dialog" role="dialog" aria-modal="true" aria-label="61315 GAMELAB 지원 안내">
    <button type="button" class="apply-modal__close" data-apply-close aria-label="닫기">&times;</button>
    <a class="apply-modal__link" href="{{ "/apply/" | relURL }}">
      <img src="{{ "img/apply-promo.png" | relURL }}" alt="61315 GAMELAB 지원하기 (~8/24)" />
    </a>
    <div class="apply-modal__actions">
      <a class="apply-modal__cta" href="{{ "/apply/" | relURL }}">지금 지원하기 &rarr;</a>
      <button type="button" class="apply-modal__dismiss" data-apply-dismiss>오늘 하루 보지 않기</button>
    </div>
  </div>
</div>

<style>
  .apply-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .apply-modal.is-open { display: flex; }
  .apply-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(2px);
  }
  .apply-modal__dialog {
    position: relative;
    width: min(420px, 100%);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    background: var(--card-background, #fff);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    overflow: hidden;
    animation: apply-modal-in 0.25s ease;
  }
  @keyframes apply-modal-in {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .apply-modal__close {
    position: absolute;
    top: 10px;
    right: 12px;
    z-index: 2;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    color: #fff;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
  }
  .apply-modal__close:hover { background: rgba(0, 0, 0, 0.65); }
  .apply-modal__link {
    display: block;
    overflow-y: auto;
  }
  .apply-modal__link img {
    display: block;
    width: 100%;
    height: auto;
  }
  .apply-modal__actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
    background: var(--card-background, #fff);
  }
  .apply-modal__cta {
    display: block;
    text-align: center;
    padding: 12px 16px;
    border-radius: 10px;
    background: #2f5bd8;
    color: #fff !important;
    font-weight: 700;
    text-decoration: none;
  }
  .apply-modal__cta:hover { background: #244bb8; }
  .apply-modal__dismiss {
    border: none;
    background: none;
    color: var(--body-text-color, #888);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px;
  }
  .apply-modal__dismiss:hover { text-decoration: underline; }
</style>

<script>
  (function () {
    var KEY = "apply-modal-dismissed-until";
    var modal = document.getElementById("apply-modal");
    if (!modal) return;

    var dismissedUntil = parseInt(localStorage.getItem(KEY) || "0", 10);
    if (dismissedUntil && Date.now() < dismissedUntil) return;

    function open() { modal.classList.add("is-open"); modal.setAttribute("aria-hidden", "false"); }
    function close() { modal.classList.remove("is-open"); modal.setAttribute("aria-hidden", "true"); }

    modal.querySelectorAll("[data-apply-close]").forEach(function (el) {
      el.addEventListener("click", close);
    });
    var dismiss = modal.querySelector("[data-apply-dismiss]");
    if (dismiss) {
      dismiss.addEventListener("click", function () {
        localStorage.setItem(KEY, String(Date.now() + 24 * 60 * 60 * 1000));
        close();
      });
    }
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") close();
    });

    open();
  })();
</script>
{{ end }}
