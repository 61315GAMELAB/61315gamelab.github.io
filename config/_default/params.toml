# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.png"

# ─────────────────────────────────────────────────────────────
# 홈 진입 시 뜨는 지원하기 유도 모달 설정 (홈에서만 노출)
#  - enabled  : true 이면 모달 사용, false 면 완전히 끔
#  - image    : 모달에 넣을 이미지 경로 (static/ 기준). 새 이미지는 static/img/ 에 두고 여기만 바꾸면 됨
#  - link     : 클릭 시 이동할 주소
#  - alt      : 이미지 대체 텍스트 (접근성)
#  - ctaText  : 하단 파란 버튼 문구
#  - startDate: 노출 시작일 "YYYY-MM-DD" (그날 0시부터). 비우면("") 시작 제한 없음
#  - endDate  : 노출 종료일 "YYYY-MM-DD" (그날 자정까지 = 그날 하루 포함). 비우면("") 종료 제한 없음
# ─────────────────────────────────────────────────────────────
[applyModal]
enabled = true
image = "img/apply-promo.png"
link = "/apply/"
alt = "61315 GAMELAB 지원하기 (~8/24)"
ctaText = "지금 지원하기 →"
startDate = "2026-08-08"
endDate = "2026-08-24"

[footer]
since = 2020
customText = ""

[dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
emoji = ""
subtitle = "We make games!"

[sidebar.avatar]
enabled = true
local = true
src = "img/avatar.png"

[article]
headingAnchor = false
math = false
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

